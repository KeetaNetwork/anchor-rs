# SonarCloud configuration for anchor-rs
sonar.projectKey=KeetaNetwork_anchor-rs
sonar.organization=keetapay

# Project information
# sonar.projectName=anchor-rs
# sonar.projectVersion=1.0

# Source code settings
# sonar.sources=.
sonar.sources=.
sonar.exclusions=target/**,**/*.md,**/*.toml,**/*.yml,**/*.yaml,**/*.json,**/generated/*.rs,scripts/**,**/build.rs

# Rust specific settings
sonar.rust.lcov.reportPaths=coverage.lcov

# Test settings
sonar.tests=.
sonar.test.inclusions=**/*test*.rs,**/tests/**

# Coverage settings
sonar.coverage.exclusions=**/*test*.rs,**/tests/**,**/examples/**,**/benches/**,keetanetwork-anchor-client/node-harness/**,scripts/**
