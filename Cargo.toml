[package]
name = "anchor-rs"
version = "0.1.0"
edition = "2021"

[lib]
name = "anchor_rs"
path = "src/lib/mod.rs"

[[bin]]
name = "anchor-rs"
path = "src/main.rs"

# Dependencies

[dependencies]
rasn = "0.27.1"
rasn-derive = "0.27.1"
hex = "0.4"
base64 = "0.22.1"
lazy_static = "1.5.0"

[dependencies.snafu]
version = "0.8.6"
features = ["std"]

[dependencies.strum]
version = "0.27.2"
features = ["derive"]

[dependencies.serde]
version = "1.0.219"
features = ["derive"]
optional = true

[dependencies.serde_json]
version = "1.0"
optional = true

# From node-rs
# TODO Publish these crates

[dependencies.crypto]
git = "ssh://git@github.com/KeetaNetwork/node-rs.git"
branch = "main"

[dependencies.x509]
git = "ssh://git@github.com/KeetaNetwork/node-rs.git"
branch = "main"

[dependencies.asn1]
git = "ssh://git@github.com/KeetaNetwork/node-rs.git"
branch = "main"

[dependencies.accounts]
git = "ssh://git@github.com/KeetaNetwork/node-rs.git"
branch = "main"

# Build Dependencies

[build-dependencies]
rasn-compiler = "0.14.2"

[features]
default = ["serde"]
serde = ["dep:serde", "dep:serde_json"]
